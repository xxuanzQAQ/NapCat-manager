<!DOCTYPE html>
<html lang="zh" class="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NapCatQQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            overflow: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .bg-animated {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background-color: #121212;
        }

        .bg-gradient-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            background-image: radial-gradient(ellipse at 70% 30%, rgba(33, 150, 243, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 30% 70%, rgba(156, 39, 176, 0.15) 0%, transparent 50%);
            animation: rotate-orb 50s linear infinite;
        }

        .bg-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><g fill="rgba(255,255,255,0.1)"><circle cx="20" cy="20" r="1" /><circle cx="50" cy="80" r="1" /><circle cx="90" cy="30" r="1" /><circle cx="10" cy="70" r="1" /><circle cx="80" cy="90" r="1" /><circle cx="150" cy="50" r="1" /><circle cx="180" cy="150" r="1" /><circle cx="120" cy="180" r="1" /><circle cx="30" cy="160" r="1" /><circle cx="190" cy="90" r="1.5" /></g></svg>');
            animation: move-bg 40s linear infinite alternate, shimmer 8s ease-in-out infinite alternate;
        }

        @keyframes rotate-orb {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes move-bg {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 200px 400px;
            }
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(40, 40, 45, 0.65), rgba(25, 25, 30, 0.7));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 16px;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px);
        }

        .input-box {
            background: rgba(45, 45, 50, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            padding: 12px 16px;
            padding-left: 40px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            border-color: #3b82f6;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            letter-spacing: 0.05em;
            border: none;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>

<body>

    <div class="bg-animated">
        <div class="bg-gradient-orb"></div>
        <div class="bg-stars"></div>
    </div>

    <div class="w-full flex items-center justify-center p-4 z-10">
        <div class="flex flex-col md:flex-row items-center justify-center gap-10 max-w-4xl w-full">

            <!-- Left Branding (Hidden on mobile) -->
            <div class="hidden md:flex flex-col items-center justify-center flex-1 text-center">
                <div
                    class="w-40 h-40 bg-white/10 rounded-3xl backdrop-blur flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(255,255,255,0.1)] border border-white/20">
                    <span class="material-icons text-7xl text-white drop-shadow-md">account_tree</span>
                </div>
                <h1
                    class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400 mb-4 tracking-wider">
                    NapCat Agent
                </h1>
                <p class="text-slate-400 text-lg">
                    Manage your QQ bots gracefully.
                </p>
            </div>

            <!-- Right Form -->
            <div class="glass-panel text-white">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-semibold mb-2">Welcome Back</h2>
                    <p class="text-sm text-slate-400">Please authenticate to continue.</p>
                </div>

                <form method="POST" action="/login">
                    {% if error %}
                    <div class="bg-red-500/20 border border-red-500/50 text-red-200 text-sm px-4 py-3 rounded-lg mb-6">
                        Authentication failed. Invalid credentials.
                    </div>
                    {% endif %}

                    <div class="mb-5 relative">
                        <span class="material-icons input-icon text-[20px]">person</span>
                        <input type="text" name="username" class="input-box" placeholder="Operator ID" required>
                    </div>

                    <div class="mb-8 relative">
                        <span class="material-icons input-icon text-[20px]">lock</span>
                        <input type="password" name="password" class="input-box" placeholder="Access Key" required>
                    </div>

                    <button type="submit" class="btn-primary flex justify-center items-center gap-2">
                        <span class="material-icons text-[20px]">login</span> Sign In
                    </button>

                    <div class="mt-6 text-center text-xs text-slate-500">
                        &copy;
                        <script>document.write(new Date().getFullYear())</script> NapCatQQ Manager.
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
