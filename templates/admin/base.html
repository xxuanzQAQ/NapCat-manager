<!DOCTYPE html>
<html lang="zh" class="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NapCat Agent Admin{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #fff;
        }

        .bg-mesh {
            background-color: #121212;
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
            background-attachment: fixed;
        }

        .sidebar {
            background: rgba(30, 30, 34, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-link {
            transition: all 0.2s ease;
            border-radius: 8px;
            margin: 4px 12px;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .glass-panel {
            background: rgba(45, 45, 50, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .btn-action {
            transition: all 0.2s;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="bg-mesh min-h-screen flex antialiased">

    <aside class="w-64 sidebar flex flex-col justify-between fixed inset-y-0 left-0 z-40">
        <div>
            <div class="p-6 flex items-center gap-3 border-b border-white/5 mb-4">
                <div
                    class="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center border border-blue-500/30">
                    <span class="material-icons text-blue-400">account_tree</span>
                </div>
                <div>
                    <h1 class="font-bold text-sm tracking-wide text-white">NapCat Agent</h1>
                    <p class="text-[0.65rem] text-slate-400 uppercase tracking-widest mt-1">Control Panel</p>
                </div>
            </div>
            <nav class="flex flex-col">
                <a href="/admin"
                    class="sidebar-link active flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-300">
                    <span class="material-icons text-lg">dns</span> Instance Manager
                </a>
                <a href="/" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-300">
                    <span class="material-icons text-lg">public</span> Userspace Board
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-white/5">
            <div class="flex items-center justify-between px-2">
                <div class="text-[0.65rem] text-slate-500 uppercase flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SYSTEM ONLINE
                </div>
                <a href="/logout"
                    class="text-xs text-red-400 hover:text-red-300 transition-colors flex items-center gap-1">
                    Logout <span class="material-icons text-sm">logout</span>
                </a>
            </div>
        </div>
    </aside>

    <main class="flex-1 ml-64 p-6 md:p-10 z-10">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
